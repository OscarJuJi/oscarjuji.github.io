    <script>
      (function () {
        var saved = localStorage.getItem('theme');
        var preferred = (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : saved;
        document.documentElement.setAttribute('data-theme', preferred || 'light');
      })();
    </script>
